name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pngquant
        run: brew install pngquant

      - name: Bundle pngquant with dylibs
        run: |
          WORKFLOW_BIN="з”»еѓЏг‚’ењ§зё®.workflow/Contents/bin"
          mkdir -p "$WORKFLOW_BIN"

          PNGQUANT_PATH=$(which pngquant)
          echo "pngquant found at: $PNGQUANT_PATH"

          # Copy pngquant binary
          cp "$PNGQUANT_PATH" "$WORKFLOW_BIN/"

          # Copy non-system dylibs
          otool -L "$PNGQUANT_PATH" | tail -n +2 | awk '{print $1}' | grep -v '^/usr/lib' | while read lib; do
            echo "Copying: $lib"
            cp "$lib" "$WORKFLOW_BIN/"
          done

          # Rewrite rpaths to use @executable_path
          chmod u+w "$WORKFLOW_BIN/pngquant"
          otool -L "$PNGQUANT_PATH" | tail -n +2 | awk '{print $1}' | grep -v '^/usr/lib' | while read lib; do
            libname=$(basename "$lib")
            install_name_tool -change "$lib" "@executable_path/$libname" "$WORKFLOW_BIN/pngquant"
          done

          # Re-sign
          codesign --force --sign - "$WORKFLOW_BIN/pngquant"

          # Verify
          echo "--- Linked libraries ---"
          otool -L "$WORKFLOW_BIN/pngquant"
          echo "--- Version ---"
          "$WORKFLOW_BIN/pngquant" --version

      - name: Create zip
        run: zip -r з”»еѓЏг‚’ењ§зё®.zip з”»еѓЏг‚’ењ§зё®.workflow

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: з”»еѓЏг‚’ењ§зё®.zip
          generate_release_notes: true
